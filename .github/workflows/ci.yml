name: 🔄 Continuous Integration

on:
  push:
    branches: [ main, develop, feature/* ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  # Use GitHub Container Registry (free for public repos)
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository }}-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository }}-frontend

jobs:
  test:
    name: 🧪 Test Application
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
          
      - name: 📦 Install backend dependencies
        run: |
          cd backend
          npm ci
          
      - name: 📦 Install frontend dependencies  
        run: |
          cd frontend
          npm ci
          
      - name: 🧪 Run backend tests
        run: |
          cd backend
          npm test
          echo "✅ Backend tests completed (placeholder implementation)"
          
      - name: 🧪 Run frontend tests
        run: |
          cd frontend
          npm test
          echo "✅ Frontend tests completed (placeholder implementation)"
          
      - name: 🔍 Lint backend code
        run: |
          cd backend
          npm run lint || echo "Backend linting skipped - no lint script"
          
      - name: 🔍 Lint frontend code
        run: |
          cd frontend
          npm run lint || echo "Frontend linting skipped - no lint script"

  security-scan:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🔒 Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          
      - name: 📊 Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  build-and-push:
    name: 🏗️ Build and Push Images
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    
    outputs:
      backend-image-digest: ${{ steps.build-backend.outputs.digest }}
      frontend-image-digest: ${{ steps.build-frontend.outputs.digest }}
      backend-image-tag: ${{ steps.meta-backend.outputs.tags }}
      frontend-image-tag: ${{ steps.meta-frontend.outputs.tags }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        
      - name: 🐳 Setup Docker Buildx
        uses: docker/setup-buildx-action@v3
        
      - name: 🔐 Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🏷️ Extract metadata for backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          
      - name: 🏷️ Extract metadata for frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}
          
      - name: 🏗️ Build and push backend
        id: build-backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta-backend.outputs.tags }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          
      - name: 🏗️ Build and push frontend
        id: build-frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📊 Image scan results
        run: |
          echo "## 🏗️ Build Results" >> $GITHUB_STEP_SUMMARY
          echo "### Backend Image" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:** ${{ steps.meta-backend.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** ${{ steps.build-backend.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo "### Frontend Image" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:** ${{ steps.meta-frontend.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Digest:** ${{ steps.build-frontend.outputs.digest }}" >> $GITHUB_STEP_SUMMARY

  update-gitops:
    name: 🔄 Update GitOps Repository
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: 🔧 Setup yq
        uses: mikefarah/yq@v4.44.1
        
      - name: 🏷️ Extract short SHA
        id: short-sha
        run: echo "sha=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT
        
      - name: 📝 Update image tags in GitOps manifests
        run: |
          # Update backend image in base deployment
          yq eval '.spec.template.spec.containers[0].image = "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:main-${{ steps.short-sha.outputs.sha }}"' -i gitops-safe/base/backend-deployment.yaml
          
          # Update frontend image in base deployment  
          yq eval '.spec.template.spec.containers[0].image = "${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:main-${{ steps.short-sha.outputs.sha }}"' -i gitops-safe/base/frontend-deployment.yaml
          
          # Update imagePullPolicy for production
          yq eval '.spec.template.spec.containers[0].imagePullPolicy = "Always"' -i gitops-safe/base/backend-deployment.yaml
          yq eval '.spec.template.spec.containers[0].imagePullPolicy = "Always"' -i gitops-safe/base/frontend-deployment.yaml
          
      - name: 💾 Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add gitops-safe/base/backend-deployment.yaml gitops-safe/base/frontend-deployment.yaml
          git diff --staged --quiet || git commit -m "🚀 Deploy: Update images to ${{ steps.short-sha.outputs.sha }}
          
          Backend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_BACKEND }}:main-${{ steps.short-sha.outputs.sha }}
          Frontend: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME_FRONTEND }}:main-${{ steps.short-sha.outputs.sha }}
          
          Triggered by: ${{ github.event.head_commit.message }}"
          git push

  notify:
    name: 📢 Notify Team
    runs-on: ubuntu-latest
    needs: [test, security-scan, build-and-push, update-gitops]
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: 📢 Create deployment summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "### Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "### Next Steps" >> $GITHUB_STEP_SUMMARY
          echo "1. Check ArgoCD for automatic sync" >> $GITHUB_STEP_SUMMARY
          echo "2. Monitor application health in Grafana" >> $GITHUB_STEP_SUMMARY
          echo "3. Verify deployment in target cluster" >> $GITHUB_STEP_SUMMARY
